<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Year Ceremony 2026 | M Ramzan Ch</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800&family=Orbitron:wght@800&family=Noto+Nastaliq+Urdu:wght@600&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    height: 100%;
    background: #000;
    color: #fff;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
}

/* Ambient gradient */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(120deg,#ff0080,#7928ca,#2afadf);
    opacity: .12;
    animation: hue 15s infinite alternate;
    z-index: -1;
}
@keyframes hue { to { filter: hue-rotate(360deg); } }

canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
}

/* Layout */
.main {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding: clamp(16px, 3vw, 32px);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

/* Event */
.event h2 {
    font-size: clamp(18px, 4vw, 32px);
    letter-spacing: 2px;
    margin-bottom: 6px;
}
.event .ur {
    font-family: 'Noto Nastaliq Urdu', serif;
    font-size: clamp(18px, 4vw, 26px);
}

/* Center Stage */
.stage {
    flex: .9;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 10px;
}

/* Quotes */
.quote-box {
    padding: clamp(14px, 3vw, 28px);
    border: 2px solid #88888888;
    border-radius: 2rem;
    width: 100%;
    max-width: 900px;
    backdrop-filter: blur(6px);
}

@keyframes fadeSlide {
    from { opacity:0; transform: translateY(20px); }
    to { opacity:1; transform: translateY(0); }
}

.quote-en {
    font-size: clamp(16px, 4vw, 24px);
    margin-bottom: 16px;
    animation: fadeSlide 3s ease;
}

.quote-ur {
    font-family: 'Noto Nastaliq Urdu', serif;
    font-size: clamp(18px, 4vw, 28px);
    line-height: 1.8;
    animation: fadeSlide 3s ease;
}

/* SVG TEXT */
.svg-text {
    width: 100%;
    max-width: 1200px;
    height: auto;
}

.stroke-text {
    fill: transparent;
    stroke-width: clamp(6px, 1vw, 20px);
    animation: dash 3s linear infinite;
}

.fill-text {
    fill: transparent;
}

@keyframes dash {
    0% {stroke: #f0f;}
    20% {stroke: #f80;}
    40% {stroke: #0f0;}
    60% {stroke: #ff0;}
    80% {stroke: #00f;}
    100% {stroke: #0ff;}
}

/* Footer */
footer {
    font-size: clamp(11px, 3vw, 14px);
    padding: 10px 16px;
    opacity: .9;
    width: 100%;
    text-align: center;
}

/* Mobile Fixes */
@media (max-width: 600px) {
    .stage {
        padding: 6px;
    }
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="main">
    <div class="event">
        <h2>✨ New Year Celebration ✨</h2>
        <div class="ur">✨ سالِ نو کی تقریب ✨</div>
    </div>

    <div class="stage" id="stage"></div>

    <footer>
        Designed with ❤️ by M Ramzan Ch For Just Little Time Happiness
    </footer>
</div>

<script>
/* ===== STEP CONTENT ===== */
const stage = document.getElementById("stage");

const quotes = [
    { en: "Every new year is a chance to begin again.", ur: "ہر نیا سال ایک نئی شروعات کا موقع ہوتا ہے" },
    { en: "Hope and effort create a brighter future.", ur: "اُمید اور محنت ایک روشن مستقبل بناتی ہیں" },
    { en: "Positive thoughts shape a successful year.", ur: "مثبت سوچ کامیاب سال کی بنیاد ہے" },
    { en: "With the memories of our loved ones who have left us.", ur: "جو ہمارے پیارے ہمے چھوڑ گئے انکی یادوں کے ساتھ۔" },
    { en: "With those who have just entered our lives.", ur: "ان لوگوں کے ساتھ جو ابھی ہماری زندگی میں داخل ہوئے ہیں " },
    { en: "Take Unlimited Successes and Happiness in Your Next Life.", ur: "اپنی اگلی زندگی میں لامحدود کامیابیاں اور خوشیاں حاصل کریں۔" }
];

let qIndex = 0;

function showQuote() {
    const q = quotes[qIndex];
    stage.innerHTML = `
        <div class="quote-box">
            <div class="quote-en">"${q.en}"</div>
            <div class="quote-ur">${q.ur}</div>
        </div>
    `;
    qIndex++;
    qIndex < quotes.length ? setTimeout(showQuote, 4000) : setTimeout(showHappyNewYear, 4500);
}

function showHappyNewYear() {
    stage.innerHTML = `
    <svg class="svg-text" viewBox="0 0 1200 220">
        <text x="50%" y="65%" text-anchor="middle" font-size="120" class="stroke-text">Happy New Year</text>
        <text x="50%" y="65%" text-anchor="middle" font-size="120" class="fill-text">Happy New Year</text>
    </svg>`;
    setTimeout(showYear, 3500);
}

function showYear() {
    stage.innerHTML = `
    <svg class="svg-text" viewBox="0 0 1200 300">
        <text x="50%" y="65%" text-anchor="middle" font-size="220" class="stroke-text">2026</text>
        <text x="50%" y="65%" text-anchor="middle" font-size="220" class="fill-text">2026</text>
    </svg>`;
    setTimeout(startSequence, 5000);
}

function startSequence() {
    qIndex = 0;
    showQuote();
}
startSequence();

/* ===== FIREWORKS ===== */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

let fireworks = [];

class Firework {
    constructor(){
        this.x=Math.random()*canvas.width;
        this.y=canvas.height;
        this.t=Math.random()*canvas.height/2;
        this.c=`hsl(${Math.random()*360},100%,60%)`;
        this.v=Math.random()*4+4;
        this.e=false;
        this.p=[];
    }
    update(){
        if(!this.e){
            this.y-=this.v;
            if(this.y<this.t) this.explode();
        } else this.p.forEach(s=>s.update());
    }
    explode(){
        this.e=true;
        for(let i=0;i<40;i++) this.p.push(new Spark(this.x,this.y,this.c));
    }
    draw(){
        if(!this.e){
            ctx.fillStyle=this.c;
            ctx.fillRect(this.x,this.y,2,8);
        } else this.p.forEach(s=>s.draw());
    }
}

class Spark{
    constructor(x,y,c){
        this.x=x; this.y=y; this.c=c;
        this.a=Math.random()*Math.PI*2;
        this.v=Math.random()*4+2;
        this.l=50;
    }
    update(){
        this.x+=Math.cos(this.a)*this.v;
        this.y+=Math.sin(this.a)*this.v;
        this.l--;
    }
    draw(){
        ctx.globalAlpha=this.l/50;
        ctx.fillStyle=this.c;
        ctx.beginPath();
        ctx.arc(this.x,this.y,2,0,Math.PI*2);
        ctx.fill();
        ctx.globalAlpha=1;
    }
}

(function loop(){
    ctx.fillStyle="rgba(0,0,0,.25)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    if(Math.random()<0.04) fireworks.push(new Firework());
    fireworks.forEach((f,i)=>{
        f.update(); f.draw();
        if(f.e && f.p.every(s=>s.l<=0)) fireworks.splice(i,1);
    });
    requestAnimationFrame(loop);
})();
</script>

</body>
</html>
